
services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "3001:3000"
    env_file:
      - .env
    environment:
      - MONGODB_URI=mongodb://mongo:27017/sewaconnect
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongo
      - redis
    volumes:
      - ./src:/app/src
      - /app/node_modules

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  mongo_data: